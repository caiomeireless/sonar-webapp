  <text x="180" y="305" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-weight="500" font-size="64" letter-spacing="-3.2" fill="#E8E4D6">Sonar</text>

  
  <circle cx="115" cy="335" r="2.5" fill="#3CFF8A"></circle>
