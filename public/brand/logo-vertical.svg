<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 460" width="360" height="460" fill="none" aria-label="Sonar — Battaglia &amp; Pedrosa Advogados (seal)">
  <defs>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3CFF8A" stop-opacity="0.42"></stop>
      <stop offset="80%" stop-color="#3CFF8A" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#3CFF8A" stop-opacity="0"></stop>
