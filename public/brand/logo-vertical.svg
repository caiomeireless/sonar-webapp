    <line x1="50" y1="94" x2="50" y2="99" stroke="#3CFF8A" stroke-width="0.9"></line>
    <line x1="1" y1="50" x2="6" y2="50" stroke="#3CFF8A" stroke-width="0.9"></line>
    <line x1="94" y1="50" x2="99" y2="50" stroke="#3CFF8A" stroke-width="0.9"></line>
    <circle cx="50" cy="50" r="36" stroke="#3CFF8A" stroke-width="0.4" stroke-opacity="0.5"></circle>
    <circle cx="50" cy="50" r="26" stroke="#3CFF8A" stroke-width="0.4" stroke-opacity="0.5"></circle>
    <circle cx="50" cy="50" r="16" stroke="#3CFF8A" stroke-width="0.4" stroke-opacity="0.5"></circle>
    <line x1="6" y1="50" x2="94" y2="50" stroke="#3CFF8A" stroke-width="0.3" stroke-opacity="0.28"></line>
